name: CI

# Validate the workspace on the two relevant platforms:
#   - Linux: portable crates + the Python neutrality tests.
#   - Windows: compiles the REAL phantom-desktop backend (cfg(windows)), which
#     the Linux env cannot build. CI is a compile-gate only for the desktop
#     backend — its runtime (CreateDesktop on an interactive session) still
#     requires a real Windows machine to exercise.

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  linux:
    name: Linux — check & portable tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo check (all targets)
        run: cargo check --all-targets

      - name: Test portable Rust crates
        run: cargo test -p phantom-fs -p phantom-proto -p phantom-core

      - name: Python provider + end-to-end tests
        run: |
          cd python
          pip install -e . pytest
          # Generate gRPC stubs, then prove the service imports and the whole
          # stack runs offline via the mock provider end-to-end test.
          python generate_proto.py
          PHANTOM_PROVIDER=mock python -c "import phantom_llm.server as s; print('server import OK')"
          python -m pytest tests/ -q

      # Whole-stack integration: boot the real Python gRPC service (mock
      # provider, no API key) and drive the real Rust agent↔client loop over
      # the cross-platform `file` backend. Gated by PHANTOM_E2E=1 so a
      # normal `cargo test` is unaffected. Proves the confidence gate and
      # Approval Queue engage correctly end-to-end (see tests/e2e_mock.rs).
      - name: End-to-end integration test (Rust ↔ gRPC ↔ Python)
        run: |
          PHANTOM_E2E=1 PHANTOM_PYTHON=python cargo test -p phantom-core --test e2e_mock -- --test-threads=1

  windows:
    name: Windows — real desktop backend compile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSVC target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # This compiles phantom-desktop's actual Windows implementation
      # (CreateDesktopW / PrintWindow / UIA-first input / SendInput) — the part
      # Linux can't build. The V2-2 UIA input module lives here, so this is the
      # compile gate for the invisible-desktop backend.
      - name: Cargo check (windows-msvc target)
        run: cargo check --target x86_64-pc-windows-msvc

      # Explicit gate for the hidden-desktop backend (V2-2), including the new
      # UIA-first input module.
      - name: Cargo check phantom-desktop (windows-msvc)
        run: cargo check --target x86_64-pc-windows-msvc -p phantom-desktop

      - name: Test portable Rust crates
        run: cargo test -p phantom-fs -p phantom-proto -p phantom-core
